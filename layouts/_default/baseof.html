<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       GLOSS-INSPIRED THEME
       ============================================ */

    /* --- Theme Variables --- */
    :root, [data-theme="light"] {
      --bg: #f5f0eb;
      --bg-card: #ffffff;
      --bg-nav: #2d3529;
      --text: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-tertiary: #999999;
      --text-nav: #f5f0eb;
      --accent: #c45d3e;
      --accent-hover: #a84d32;
      --green-dark: #2d3529;
      --green-badge: #2d3529;
      --border: #d4cec7;
      --border-heavy: #1a1a1a;
      --border-light: #e5dfd8;
      --link: #1a1a1a;
      --link-hover: #c45d3e;
      --code-bg: #ebe5de;
      --tag-bg: #2d3529;
      --tag-text: #f5f0eb;
    }
    [data-theme="dark"] {
      --bg: #1a1a1a;
      --bg-card: #242424;
      --bg-nav: #2d3529;
      --text: #e8e0d8;
      --text-secondary: #a09890;
      --text-tertiary: #706860;
      --text-nav: #f5f0eb;
      --accent: #d4775c;
      --accent-hover: #e88a6f;
      --green-dark: #3d4539;
      --green-badge: #3d4539;
      --border: #333;
      --border-heavy: #e8e0d8;
      --border-light: #2a2a2a;
      --link: #e8e0d8;
      --link-hover: #d4775c;
      --code-bg: #2a2a2a;
      --tag-bg: #3d4539;
      --tag-text: #e8e0d8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      transition: background 0.2s, color 0.2s;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--link); text-decoration: none; }
    a:hover { color: var(--link-hover); }

    /* ============================================
       HEADER / NAV — Gloss style
       ============================================ */
    .site-header {
      background: var(--bg-nav);
      padding: 0;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 14px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .site-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .site-logo-icon {
      width: 32px;
      height: 32px;
      background: var(--text-nav);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .site-logo-icon svg {
      width: 18px;
      height: 18px;
      color: var(--bg-nav);
    }
    .site-logo-text {
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text-nav);
      letter-spacing: -0.3px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .header-right a {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-nav);
      opacity: 0.85;
      transition: opacity 0.2s;
    }
    .header-right a:hover { opacity: 1; color: var(--text-nav); }
    .nav-subscribe-btn {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--bg-nav) !important;
      background: var(--text-nav);
      padding: 8px 20px;
      border-radius: 6px;
      opacity: 1 !important;
      transition: opacity 0.2s;
      text-decoration: none;
    }
    .nav-subscribe-btn:hover { opacity: 0.9 !important; color: var(--bg-nav) !important; }

    /* Theme toggle */
    .theme-toggle {
      background: none;
      border: 1px solid rgba(245,240,235,0.3);
      border-radius: 6px;
      padding: 6px 8px;
      cursor: pointer;
      color: var(--text-nav);
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .theme-toggle:hover { opacity: 1; }
    .theme-toggle svg { width: 16px; height: 16px; }

    /* ============================================
       LAYOUT
       ============================================ */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 40px;
    }
    .container-narrow {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ============================================
       SECTION DIVIDERS — thick black rules
       ============================================ */
    .section-divider {
      border: none;
      border-top: 3px solid var(--border-heavy);
      margin: 0;
    }

    /* ============================================
       CATEGORY BADGES — dark green pills
       ============================================ */
    .cat-badge {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      padding: 6px 14px;
      border-radius: 4px;
      background: var(--tag-bg);
      color: var(--tag-text);
      margin-bottom: 8px;
    }

    /* Inline category label (used in cards, hero) */
    .cat-label {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--accent);
    }

    /* ============================================
       SECTION HEADERS (category rows)
       ============================================ */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-top: 40px;
    }
    .section-see-all {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--accent);
    }
    .section-see-all:hover { color: var(--accent-hover); }
    .section-see-all::after { content: " →"; }

    /* ============================================
       BYLINE — uppercase mono
       ============================================ */
    .byline {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--text-tertiary);
    }

    /* ============================================
       HERO — 3-column layout
       ============================================ */
    .hero-section {
      padding: 32px 0 40px;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }
    @media (min-width: 1024px) {
      .hero-grid {
        grid-template-columns: 280px 1fr 280px;
        gap: 40px;
      }
    }

    /* Hero center — big featured article */
    .hero-center {
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding: 0;
    }
    .hero-center .cat-label {
      margin-bottom: 16px;
    }
    .hero-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: clamp(28px, 3.5vw, 48px);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.025em;
      margin-bottom: 20px;
      max-width: 640px;
      color: var(--text);
    }
    .hero-title a { color: var(--text); }
    .hero-title a:hover { color: var(--text-secondary); }
    .hero-excerpt {
      font-size: 21px;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-bottom: 10px;
      max-width: 520px;
    }
    .hero-center-img {
      width: 100%;
      max-width: 540px;
      aspect-ratio: 16/10;
      object-fit: cover;
      border-radius: 4px;
      margin-top: 20px;
    }

    /* Hero sidebars */
    .hero-sidebar-title {
      margin-bottom: 20px;
    }
    .sidebar-card {
      display: flex;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border-light);
      align-items: flex-start;
    }
    .sidebar-card:last-child { border-bottom: none; }
    .sidebar-card-img {
      width: 80px;
      height: 60px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
      background: var(--border-light);
    }
    .sidebar-card-content { flex: 1; }
    .sidebar-card-content .cat-label {
      font-size: 13px;
      display: block;
      margin-bottom: 4px;
    }
    .sidebar-card-content h3 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 24px;
      font-weight: 400;
      line-height: 1.25;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }
    .sidebar-card-content h3 a { color: var(--text); }
    .sidebar-card-content h3 a:hover { color: var(--text-secondary); }

    /* Trending sidebar (text only, no images) */
    .trending-card {
      padding: 14px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .trending-card:last-child { border-bottom: none; }
    .trending-card h3 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 21px;
      font-weight: 400;
      line-height: 1.3;
      margin-bottom: 6px;
    }
    .trending-card h3 a { color: var(--text); }
    .trending-card h3 a:hover { color: var(--text-secondary); }

    /* ============================================
       FEATURED IMAGE ROW — centered under hero
       ============================================ */
    .featured-row-center {
      max-width: 760px;
      margin: 0 auto;
    }
    .featured-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      padding: 40px 0;
    }
    @media (min-width: 768px) {
      .featured-row {
        grid-template-columns: 1fr 1fr;
        gap: 24px;
      }
    }
    @media (min-width: 1024px) {
      .featured-row-3 {
        grid-template-columns: 3fr 2fr;
      }
    }
    .featured-img-card img {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 16px;
    }
    .featured-img-card .cat-label { margin-bottom: 8px; display: block; }
    .featured-img-card h2 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 22px;
      font-weight: 400;
      line-height: 1.25;
      margin-bottom: 8px;
    }
    .featured-img-card h2 a { color: var(--text); }
    .featured-img-card h2 a:hover { color: var(--text-secondary); }
    .featured-img-card .article-excerpt {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    /* Large featured card (illustration/hero image) */
    .featured-lg-card img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      border-radius: 4px;
    }

    /* Dark overlay card */
    .featured-overlay-card {
      position: relative;
      border-radius: 4px;
      overflow: hidden;
    }
    .featured-overlay-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .featured-overlay-card .overlay-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      color: #fff;
    }
    .featured-overlay-card .cat-label { color: #ccc; }
    .featured-overlay-card h2 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 20px;
      font-weight: 400;
      line-height: 1.25;
      color: #fff;
    }
    .featured-overlay-card h2 a { color: #fff; }
    .featured-overlay-card .byline { color: #aaa; }

    /* ============================================
       TWO-COL ARTICLE CARDS
       ============================================ */
    .two-col-articles {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      padding: 0 0 8px;
    }
    @media (min-width: 768px) {
      .two-col-articles {
        grid-template-columns: 1fr 1fr;
        gap: 0;
      }
      .two-col-articles .article-text-card:nth-child(odd) {
        border-right: 1px solid var(--border-light);
        padding-right: 32px;
      }
      .two-col-articles .article-text-card:nth-child(even) {
        padding-left: 32px;
      }
    }
    .article-text-card {
      padding: 24px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .article-text-card .cat-label { display: block; margin-bottom: 8px; }
    .article-text-card h2 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 27px;
      font-weight: 400;
      line-height: 1.25;
      letter-spacing: -0.01em;
      margin-bottom: 10px;
    }
    .article-text-card h2 a { color: var(--text); }
    .article-text-card h2 a:hover { color: var(--text-secondary); }
    .article-text-card .article-excerpt {
      font-size: 18px;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ============================================
       CATEGORY CARD GRID — 4 columns with images
       ============================================ */
    .card-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      padding-bottom: 40px;
    }
    @media (min-width: 640px) {
      .card-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (min-width: 1024px) {
      .card-grid { grid-template-columns: repeat(4, 1fr); }
    }
    .card-grid-item img {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 12px;
      background: var(--border-light);
    }
    .card-grid-item h3 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 27px;
      font-weight: 400;
      line-height: 1.25;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }
    .card-grid-item h3 a { color: var(--text); }
    .card-grid-item h3 a:hover { color: var(--text-secondary); }
    .card-grid-item .article-excerpt {
      font-size: 18px;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ============================================
       SINGLE POST — two-column with right rail
       ============================================ */
    .post-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
      padding-top: 8px;
    }
    @media (min-width: 1024px) {
      .post-layout {
        grid-template-columns: 1fr 280px;
        gap: 60px;
      }
    }

    /* Right rail / sidebar */
    .post-rail {
      padding-top: 40px;
    }
    @media (min-width: 1024px) {
      .post-rail {
        position: sticky;
        top: 80px;
        align-self: start;
      }
    }
    .rail-section {
      margin-bottom: 40px;
    }
    .rail-section-title {
      margin-bottom: 16px;
    }
    .rail-card {
      padding: 12px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .rail-card:last-child { border-bottom: none; }
    .rail-card .cat-label {
      font-size: 10px;
      display: block;
      margin-bottom: 4px;
    }
    .rail-card h4 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 15px;
      font-weight: 400;
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .rail-card h4 a { color: var(--text); }
    .rail-card h4 a:hover { color: var(--text-secondary); }
    .rail-ad-slot {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border-radius: 12px;
      padding: 28px 22px;
      text-align: center;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .rail-ad-slot::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 70%, rgba(211, 140, 90, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 70% 30%, rgba(100, 140, 200, 0.1) 0%, transparent 50%);
      pointer-events: none;
    }
    .rail-ad-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      font-weight: 400;
      color: #d3a077;
      margin-bottom: 10px;
      position: relative;
    }
    .rail-ad-tagline {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: rgba(255,255,255,0.85);
      margin-bottom: 16px;
      position: relative;
    }
    .rail-ad-cta {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #1a1a2e;
      background: #d3a077;
      padding: 8px 20px;
      border-radius: 20px;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
      position: relative;
    }
    .rail-ad-cta:hover {
      background: #e0b48f;
      transform: translateY(-1px);
    }
    .rail-ad-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.35);
      margin-top: 14px;
      position: relative;
    }
    [data-theme="dark"] .rail-ad-slot {
      background: linear-gradient(135deg, #0d0d1a 0%, #111827 50%, #0a1628 100%);
    }

    .post-header { margin-bottom: 32px; padding-top: 40px; }
    .post-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 47px;
      font-weight: 400;
      line-height: 1.15;
      margin-bottom: 12px;
    }
    @media (min-width: 768px) { .post-title { font-size: 62px; } }
    .post-description {
      font-size: 20px;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-bottom: 16px;
      max-width: 640px;
    }
    .post-meta {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding-bottom: 20px;
      margin-bottom: 24px;
      border-bottom: 3px solid var(--border-heavy);
    }
    .post-content {
      max-width: 800px;
      font-size: 17px;
      line-height: 1.8;
    }
    .post-content h1 { font-family: 'DM Serif Display', Georgia, serif; font-size: 32px; font-weight: 400; margin: 1.5em 0 0.5em; }
    .post-content h2 { font-family: 'DM Serif Display', Georgia, serif; font-size: 28px; font-weight: 400; margin: 1.4em 0 0.5em; }
    .post-content h3 { font-family: 'DM Serif Display', Georgia, serif; font-size: 22px; font-weight: 400; margin: 1.3em 0 0.5em; }
    .post-content p { margin-bottom: 1em; }
    .post-content ul, .post-content ol { margin-bottom: 1em; padding-left: 1.5em; }
    .post-content li { margin-bottom: 0.3em; }
    .post-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 20px;
      margin: 1.5em 0;
      font-family: 'DM Serif Display', Georgia, serif;
      font-style: italic;
      color: var(--text-secondary);
      font-size: 20px;
    }
    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      margin: 1.5em 0;
    }
    .post-content a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
    .post-content a:hover { color: var(--accent-hover); }
    .post-content strong { font-weight: 700; }
    .post-content em { font-style: italic; }
    .post-content code {
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.9em;
      font-family: 'DM Mono', monospace;
    }
    .post-content pre {
      background: var(--code-bg);
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
      margin-bottom: 1em;
    }
    .post-content pre code { background: none; padding: 0; }

    /* ============================================
       PHOTO HERO
       ============================================ */
    .photo-hero {
      width: 100%;
      max-height: 60vh;
      object-fit: cover;
      display: block;
      margin-bottom: 32px;
      border-radius: 12px;
    }

    /* ============================================
       RECIPE LAYOUT
       ============================================ */
    .recipe-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
      max-width: 800px;
    }
    @media (min-width: 768px) { .recipe-grid { grid-template-columns: 260px 1fr; } }
    .recipe-sidebar {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      padding: 24px;
      border-radius: 4px;
      height: fit-content;
    }
    @media (min-width: 768px) { .recipe-sidebar { position: sticky; top: 80px; } }
    .recipe-sidebar h3 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 18px;
      font-weight: 400;
      margin-bottom: 12px;
    }
    .recipe-sidebar ul { list-style: none; padding: 0; }
    .recipe-sidebar li {
      padding: 8px 0;
      border-bottom: 1px solid var(--border-light);
      font-size: 14px;
    }
    .recipe-sidebar li:last-child { border-bottom: none; }

    /* ============================================
       BACK LINK
       ============================================ */
    .back-link {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-tertiary);
      text-decoration: none;
      margin-bottom: 8px;
      padding-top: 24px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .back-link:hover { color: var(--accent); }

    /* ============================================
       SUBSCRIBE PAGE
       ============================================ */
    .subscribe-wrapper {
      display: flex;
      justify-content: center;
      padding: 80px 0;
    }
    .subscribe-card {
      width: 100%;
      max-width: 480px;
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 48px 40px;
      text-align: center;
      background: var(--bg-card);
    }
    .subscribe-card h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 32px;
      font-weight: 400;
      margin-bottom: 8px;
    }
    .subscribe-card .subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .subscribe-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 320px;
      margin: 0 auto;
    }
    .subscribe-form input {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
    .subscribe-form input:focus { border-color: var(--accent); }
    .subscribe-form input::placeholder { color: var(--text-tertiary); }
    .subscribe-form button {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 16px;
      border: none;
      border-radius: 6px;
      background: var(--green-dark);
      color: var(--tag-text);
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .subscribe-form button:hover { opacity: 0.85; }
    .subscribe-privacy {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 16px;
    }
    .subscribe-success { display: none; font-size: 16px; margin-top: 20px; color: var(--text); }
    .subscribe-home-link { display: none; margin-top: 12px; font-size: 14px; }
    .subscribe-home-link a { color: var(--accent); text-decoration: underline; }

    /* ============================================
       FOOTER
       ============================================ */
    .site-footer {
      margin-top: 64px;
      padding: 32px 0;
      border-top: 3px solid var(--border-heavy);
    }
    .footer-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--text-tertiary);
    }
    .footer-inner a { color: var(--text-tertiary); }
    .footer-inner a:hover { color: var(--accent); }
    .footer-links { display: flex; gap: 20px; }

    /* ============================================
       LIST PAGE
       ============================================ */
    .list-page-header {
      padding: 40px 0 24px;
    }
    .list-page-header h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 36px;
      font-weight: 400;
    }

    /* ============================================
       MOBILE ADJUSTMENTS
       ============================================ */
    @media (max-width: 768px) {
      .header-inner { padding: 12px 20px; }
      .container { padding: 0 20px; }
      .hero-title { font-size: 32px; }
      .footer-inner {
        flex-direction: column;
        gap: 8px;
        text-align: center;
        padding: 0 20px;
      }
      .section-header { flex-wrap: wrap; gap: 8px; }
    }

    /* ============================================
       TWO-PHOTO / TWO-VIDEO SHORTCODES
       ============================================ */
    .two-photos, .two-videos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 1.5em 0;
    }
    @media (max-width: 600px) {
      .two-photos, .two-videos { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="site-logo">
        <span class="site-logo-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="4"/></svg>
        </span>
        <span class="site-logo-text">{{ .Site.Title | lower }}</span>
      </a>
      <div class="header-right">
        <a href="/blog/">Blog</a>
        <a href="/about/">About</a>
        <a href="/subscribe/" class="nav-subscribe-btn">Subscribe</a>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
          <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>&copy; {{ now.Year }} {{ .Site.Title }}</span>
      <div class="footer-links">
        <a href="/">Home</a>
        <a href="/blog/">Blog</a>
        <a href="/about/">About</a>
        <a href="/subscribe/">Subscribe</a>
      </div>
    </div>
  </footer>

  <script>
    function toggleTheme() {
      const current = localStorage.getItem('theme') || 'light';
      const next = current === 'light' ? 'dark' : current === 'dark' ? 'system' : 'light';
      localStorage.setItem('theme', next);
      applyTheme(next);
    }
    function applyTheme(pref) {
      const html = document.documentElement;
      if (pref === 'system') {
        const sys = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        html.setAttribute('data-theme', sys);
      } else {
        html.setAttribute('data-theme', pref);
      }
      updateIcon(pref);
    }
    function updateIcon(pref) {
      const icon = document.getElementById('theme-icon');
      if (pref === 'dark') {
        icon.innerHTML = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
      } else if (pref === 'system') {
        icon.innerHTML = '<rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>';
      } else {
        icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
      }
    }
    (function() {
      const saved = localStorage.getItem('theme') || 'light';
      applyTheme(saved);
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if (localStorage.getItem('theme') === 'system') applyTheme('system');
      });
    })();
  </script>
  <script>
    fetch('/api/page-views', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: location.pathname })
    }).catch(() => {});
  </script>
</body>
</html>
