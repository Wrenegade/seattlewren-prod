<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sage: #8B9D83;
      --sage-dark: #6B7D63;
      --terracotta: #D87461;
      --warm-gray: #F5F5F5;
      --text-primary: #2D2D2D;
      --text-secondary: #666666;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 17px;
      line-height: 1.7;
      color: var(--text-primary);
      background: #fff;
    }

    /* --- Header --- */
    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: linear-gradient(to right, var(--sage), var(--sage-dark));
    }
    .header-top {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .site-logo {
      font-family: 'Noto Serif JP', serif;
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
    }
    .site-logo:hover { opacity: 0.9; }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .tagline {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      font-style: italic;
      white-space: nowrap;
    }
    @media (max-width: 900px) { .tagline { display: none; } }
    .header-social {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .header-social a {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      color: rgba(255,255,255,0.7);
      transition: color 0.3s;
    }
    .header-social a:hover { color: #fff; }
    .header-social svg { width: 18px; height: 18px; }
    .header-top { position: relative; overflow: hidden; }

    /* Flying wren */
    .wren-flyer {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 36px;
      left: -50px;
      z-index: 10;
    }
    .wren-flyer.flying {
      animation: flyAcrossAndBack 4s ease-in-out forwards;
    }
    .wren-flyer.flip {
      transform: translateY(-50%) scaleX(-1);
    }
    .fly-wing {
      transform-origin: 18px 16px;
      animation: flap 0.12s ease-in-out infinite alternate;
    }
    @keyframes flap {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-35deg); }
    }
    @keyframes flyAcrossAndBack {
      0%   { left: -50px; }
      40%  { left: calc(100% - 40px); }
      45%  { left: calc(100% - 40px); }
      100% { left: 50%; }
    }

    /* Front-facing wren (after landing) */
    .wren-front-wrap {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      z-index: 10;
      display: none;
    }
    .wren-front-wrap.visible { display: block; }
    .wren-wave-left {
      transform-origin: 10px 18px;
    }
    .wren-wave-right {
      transform-origin: 30px 18px;
    }
    .wren-wave-left.waving {
      animation: waveLeft 0.3s ease-in-out 6 alternate;
    }
    .wren-wave-right.waving {
      animation: waveRight 0.3s ease-in-out 6 alternate;
    }
    @keyframes waveLeft {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-25deg); }
    }
    @keyframes waveRight {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(25deg); }
    }
    .header-nav {
      height: 40px;
      border-top: 1px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
    }
    .header-nav-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
      width: 100%;
      display: flex;
      gap: 24px;
    }
    .header-nav a {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      transition: color 0.3s;
    }
    .header-nav a:hover { color: #fff; }
    .header-spacer { height: 96px; }

    /* --- Main Container --- */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* --- Homepage Post Cards --- */
    .posts-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
      margin-top: 32px;
    }
    @media (min-width: 768px) { .posts-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1024px) { .posts-grid { grid-template-columns: repeat(3, 1fr); } }

    .post-card {
      background: #fff;
      transition: box-shadow 0.5s;
    }
    .post-card:hover { box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1); }
    .post-card a { text-decoration: none; color: inherit; }
    .post-card-image {
      width: 100%;
      aspect-ratio: 16/11;
      object-fit: cover;
      display: block;
      transition: transform 0.7s;
    }
    .post-card:hover .post-card-image { transform: scale(1.05); }
    .post-card-image-wrap { overflow: hidden; }
    .post-card-body { padding: 16px 20px; }
    .post-card-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .post-card-meta {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-style: italic;
    }
    .post-card-excerpt {
      font-size: 14px;
      color: var(--text-secondary);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* --- Category Badges --- */
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 4px;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    .badge-general { background: #eff6ff; color: #1d4ed8; }
    .badge-workflow { background: #faf5ff; color: #7e22ce; }
    .badge-recipe { background: #fff7ed; color: #c2410c; }
    .badge-ai { background: #eff6ff; color: #1d4ed8; }
    .badge-hobbies { background: #faf5ff; color: #7e22ce; }
    .badge-musings { background: #f0f9ff; color: #0369a1; }

    /* --- Section Headings --- */
    .section-heading {
      font-family: 'Noto Serif JP', serif;
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 32px;
      color: var(--text-primary);
    }

    /* --- Single Post (Standard) --- */
    .post-header {
      margin-bottom: 32px;
    }
    .post-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 36px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 12px;
    }
    @media (min-width: 768px) { .post-title { font-size: 42px; } }
    .post-meta {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }
    .post-content {
      max-width: 800px;
      margin: 0 auto;
      font-size: 17px;
      line-height: 1.7;
    }
    .post-content h1 { font-family: 'Noto Serif JP', serif; font-size: 32px; font-weight: 700; margin: 1.5em 0 0.5em; }
    .post-content h2 { font-family: 'Noto Serif JP', serif; font-size: 26px; font-weight: 700; margin: 1.4em 0 0.5em; }
    .post-content h3 { font-family: 'Noto Serif JP', serif; font-size: 22px; font-weight: 700; margin: 1.3em 0 0.5em; }
    .post-content p { margin-bottom: 1em; }
    .post-content ul, .post-content ol { margin-bottom: 1em; padding-left: 1.5em; }
    .post-content li { margin-bottom: 0.3em; }
    .post-content blockquote {
      border-left: 4px solid var(--sage);
      padding-left: 24px;
      margin: 1.5em 0;
      font-style: italic;
      color: var(--text-secondary);
      font-size: 20px;
    }
    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin: 1.5em 0;
    }
    .post-content a { color: var(--sage-dark); text-decoration: underline; }
    .post-content a:hover { color: var(--sage); }
    .post-content strong { font-weight: 700; }
    .post-content em { font-style: italic; }
    .post-content code {
      background: var(--warm-gray);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.9em;
    }
    .post-content pre {
      background: var(--warm-gray);
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
      margin-bottom: 1em;
    }
    .post-content pre code { background: none; padding: 0; }

    /* --- Photo Layout --- */
    .photo-hero {
      width: 100%;
      max-height: 60vh;
      object-fit: cover;
      display: block;
      margin-bottom: 32px;
    }

    /* --- Recipe Layout --- */
    .recipe-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
      max-width: 900px;
      margin: 0 auto;
    }
    @media (min-width: 768px) { .recipe-grid { grid-template-columns: 300px 1fr; } }
    .recipe-sidebar {
      background: var(--warm-gray);
      padding: 24px;
      border-radius: 0;
      height: fit-content;
    }
    @media (min-width: 768px) { .recipe-sidebar { position: sticky; top: 112px; } }
    .recipe-sidebar h3 {
      font-family: 'Noto Serif JP', serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-primary);
    }
    .recipe-sidebar ul {
      list-style: none;
      padding: 0;
    }
    .recipe-sidebar li {
      padding: 8px 0;
      border-bottom: 1px solid #e5e5e5;
      font-size: 15px;
    }
    .recipe-sidebar li:last-child { border-bottom: none; }
    .recipe-instructions {
      counter-reset: step;
    }
    .recipe-instructions h2 {
      font-family: 'Noto Serif JP', serif;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    /* --- Back Link --- */
    .back-link {
      display: inline-block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      margin-bottom: 24px;
      transition: color 0.3s;
    }
    .back-link:hover { color: var(--sage); }

    /* --- Subscribe Page --- */
    .subscribe-wrapper {
      display: flex;
      justify-content: center;
      padding: 40px 0;
    }
    .subscribe-card {
      width: 100%;
      max-width: 600px;
      background: linear-gradient(135deg, var(--sage), var(--sage-dark));
      border-radius: 12px;
      padding: 48px 40px;
      text-align: center;
      color: #fff;
    }
    .subscribe-card h1 {
      font-family: 'Noto Serif JP', serif;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .subscribe-card .subtitle {
      font-size: 16px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .subscribe-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 400px;
      margin: 0 auto;
    }
    .subscribe-form input {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      padding: 12px 16px;
      border: none;
      border-radius: 6px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      outline: none;
      transition: background 0.3s;
    }
    .subscribe-form input::placeholder { color: rgba(255,255,255,0.6); }
    .subscribe-form input:focus { background: rgba(255,255,255,0.3); }
    .subscribe-form button {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 12px 16px;
      border: none;
      border-radius: 6px;
      background: #fff;
      color: var(--sage-dark);
      cursor: pointer;
      transition: opacity 0.3s;
    }
    .subscribe-form button:hover { opacity: 0.9; }
    .subscribe-privacy {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-top: 16px;
    }
    .subscribe-success {
      display: none;
      font-size: 18px;
      margin-top: 20px;
    }

    /* --- Footer --- */
    .site-footer {
      margin-top: 96px;
      padding: 64px 0;
      border-top: 1px solid #f0f0f0;
      background: #fff;
    }
    .footer-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* --- Search --- */
    .search-box {
      display: flex;
      align-items: center;
      margin-left: auto;
    }
    .search-box input {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      padding: 4px 12px;
      width: 200px;
      border: none;
      border-radius: 4px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      outline: none;
      transition: background 0.3s;
    }
    .search-box input::placeholder { color: rgba(255,255,255,0.5); }
    .search-box input:focus { background: rgba(255,255,255,0.3); }

    /* --- Mobile --- */
    @media (max-width: 767px) {
      .header-nav { display: none; }
      .header-spacer { height: 56px; }
      .section-heading { font-size: 24px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-top">
      <div class="header-left">
        <a href="/" class="site-logo">{{ .Site.Title }}</a>
        <span class="tagline">AI, creativity, music &amp; contemplation from the PNW</span>
      </div>

      <div class="header-social">
        <a href="#" aria-label="Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="5"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
          </svg>
        </a>
        <a href="#" aria-label="Twitter">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/>
          </svg>
        </a>
        <a href="#" aria-label="LinkedIn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>
          </svg>
        </a>
        <a href="mailto:#" aria-label="Email">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
        </a>
      </div>

      <!-- Side-view wren (flies across header) -->
      <svg class="wren-flyer" id="wren-flyer" viewBox="0 0 50 42" fill="none">
        <!-- tail (upturned, classic wren) -->
        <path d="M6,22 Q1,14 3,8" stroke="#5C3A1E" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M7,23 Q2,16 5,10" stroke="#7A5230" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <path d="M8,24 Q4,18 6,12" stroke="#8B6340" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- body -->
        <ellipse cx="22" cy="24" rx="11" ry="7.5" fill="#8B6340"/>
        <!-- belly (lighter) -->
        <ellipse cx="24" cy="27" rx="8" ry="4.5" fill="#C4A67A"/>
        <!-- barring on belly -->
        <path d="M18,26 Q24,25 30,26" stroke="#7A5230" stroke-width="0.6" fill="none" opacity="0.5"/>
        <path d="M19,28 Q24,27 29,28" stroke="#7A5230" stroke-width="0.6" fill="none" opacity="0.5"/>
        <!-- head -->
        <circle cx="32" cy="16" r="6" fill="#6B4423"/>
        <!-- eyebrow stripe (pale) -->
        <path d="M28,13 Q32,11 36,13" stroke="#E8D5B0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <!-- eye -->
        <circle cx="34" cy="14.5" r="1.5" fill="#1a1a1a"/>
        <circle cx="34.4" cy="14.1" r="0.5" fill="#fff"/>
        <!-- beak (thin, slightly curved) -->
        <path d="M37.5,15 Q41,14.2 43,13.5" stroke="#2D2D2D" stroke-width="1.3" fill="none" stroke-linecap="round"/>
        <!-- wing -->
        <g class="fly-wing">
          <path d="M17,20 Q13,10 20,7 Q25,11 22,20Z" fill="#6B4423"/>
          <!-- wing barring -->
          <path d="M17.5,17 Q19,13 21,15" stroke="#C4A67A" stroke-width="0.7" fill="none" opacity="0.7"/>
          <path d="M18,19 Q19.5,15 21.5,17" stroke="#C4A67A" stroke-width="0.7" fill="none" opacity="0.7"/>
        </g>
        <!-- legs -->
        <line x1="20" y1="30" x2="18" y2="36" stroke="#8B7355" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="25" y1="30" x2="27" y2="36" stroke="#8B7355" stroke-width="1.3" stroke-linecap="round"/>
        <!-- feet -->
        <path d="M15,36 L18,36 L20,36" stroke="#8B7355" stroke-width="1" fill="none" stroke-linecap="round"/>
        <path d="M25,36 L27,36 L29,36" stroke="#8B7355" stroke-width="1" fill="none" stroke-linecap="round"/>
      </svg>

      <!-- Front-facing wren (waves at reader) -->
      <div class="wren-front-wrap" id="wren-front">
        <svg viewBox="0 0 44 46" fill="none" width="44" height="46">
          <!-- body -->
          <ellipse cx="22" cy="28" rx="10" ry="9" fill="#8B6340"/>
          <!-- belly -->
          <ellipse cx="22" cy="30" rx="7" ry="6" fill="#C4A67A"/>
          <!-- belly barring -->
          <path d="M17,29 Q22,28 27,29" stroke="#7A5230" stroke-width="0.6" fill="none" opacity="0.5"/>
          <path d="M18,31 Q22,30 26,31" stroke="#7A5230" stroke-width="0.6" fill="none" opacity="0.5"/>
          <!-- head -->
          <circle cx="22" cy="13" r="7" fill="#6B4423"/>
          <!-- crown (slightly rufous) -->
          <path d="M15,11 Q22,6 29,11" fill="#5C3A1E"/>
          <!-- eyebrow stripes -->
          <path d="M16,11.5 Q19,10 20,11" stroke="#E8D5B0" stroke-width="1" fill="none" stroke-linecap="round"/>
          <path d="M24,11 Q25,10 28,11.5" stroke="#E8D5B0" stroke-width="1" fill="none" stroke-linecap="round"/>
          <!-- eyes -->
          <circle cx="18.5" cy="12.5" r="1.5" fill="#1a1a1a"/>
          <circle cx="25.5" cy="12.5" r="1.5" fill="#1a1a1a"/>
          <circle cx="18.9" cy="12.1" r="0.5" fill="#fff"/>
          <circle cx="25.9" cy="12.1" r="0.5" fill="#fff"/>
          <!-- beak -->
          <path d="M22,16 L20,19 L24,19 Z" fill="#4A3728"/>
          <!-- left wing (waves) -->
          <g class="wren-wave-left" id="wave-left">
            <path d="M12,24 Q4,19 6,12 Q10,17 12,22Z" fill="#6B4423"/>
            <path d="M8,16 Q10,18 11,21" stroke="#C4A67A" stroke-width="0.7" fill="none" opacity="0.6"/>
            <path d="M7,14 Q9.5,16 10.5,19" stroke="#C4A67A" stroke-width="0.7" fill="none" opacity="0.6"/>
          </g>
          <!-- right wing (waves) -->
          <g class="wren-wave-right" id="wave-right">
            <path d="M32,24 Q40,19 38,12 Q34,17 32,22Z" fill="#6B4423"/>
            <path d="M36,16 Q34,18 33,21" stroke="#C4A67A" stroke-width="0.7" fill="none" opacity="0.6"/>
            <path d="M37,14 Q34.5,16 33.5,19" stroke="#C4A67A" stroke-width="0.7" fill="none" opacity="0.6"/>
          </g>
          <!-- legs -->
          <line x1="19" y1="36" x2="19" y2="41" stroke="#8B7355" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="25" y1="36" x2="25" y2="41" stroke="#8B7355" stroke-width="1.3" stroke-linecap="round"/>
          <!-- feet -->
          <path d="M17,41 L19,41 L21,41" stroke="#8B7355" stroke-width="1" fill="none" stroke-linecap="round"/>
          <path d="M23,41 L25,41 L27,41" stroke="#8B7355" stroke-width="1" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
    <nav class="header-nav">
      <div class="header-nav-inner">
        <a href="/">Home</a>
        <a href="/blog/">Blog</a>
        <a href="/subscribe/">Subscribe</a>
        <div class="search-box">
          <input type="text" id="site-search" placeholder="Search posts..." onkeyup="filterPosts()">
        </div>
      </div>
    </nav>
  </header>
  <div class="header-spacer"></div>
  <main class="container">
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="site-footer">
    <div class="footer-inner">
      <p>&copy; {{ now.Year }} {{ .Site.Title }}</p>
    </div>
  </footer>
  <script>
    function filterPosts() {
      const query = document.getElementById('site-search').value.toLowerCase();
      const cards = document.querySelectorAll('.post-card');
      cards.forEach(card => {
        const title = card.querySelector('.post-card-title')?.textContent.toLowerCase() || '';
        const excerpt = card.querySelector('.post-card-excerpt')?.textContent.toLowerCase() || '';
        const badges = card.querySelectorAll('.badge');
        let cats = '';
        badges.forEach(b => cats += b.textContent.toLowerCase() + ' ');
        card.style.display = (title.includes(query) || excerpt.includes(query) || cats.includes(query)) ? '' : 'none';
      });
    }
  </script>
  <script>
    (function() {
      const flyer = document.getElementById('wren-flyer');
      const front = document.getElementById('wren-front');
      const waveL = document.getElementById('wave-left');
      const waveR = document.getElementById('wave-right');

      // Start flying on page load
      setTimeout(() => flyer.classList.add('flying'), 300);

      // When flight ends: hide flyer, show front-facing wren, start waving
      flyer.addEventListener('animationend', () => {
        flyer.style.display = 'none';
        front.classList.add('visible');
        startWave();
      });

      function startWave() {
        waveL.classList.remove('waving');
        waveR.classList.remove('waving');
        // Force reflow to restart animation
        void waveL.offsetWidth;
        waveL.classList.add('waving');
        waveR.classList.add('waving');
      }

      // Wave every 10 seconds
      setInterval(startWave, 10000);
    })();
  </script>
</body>
</html>
