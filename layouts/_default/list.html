{{ define "main" }}
<h2 class="section-heading">{{ .Title }}</h2>
<div class="posts-grid">
  {{ range .Pages }}
  <div class="post-card">
    <a href="{{ .Permalink }}">
      {{ with .Params.image }}
      <div class="post-card-image-wrap">
        <img class="post-card-image" src="{{ . }}" alt="{{ $.Title }}">
      </div>
      {{ end }}
      <div class="post-card-body">
        {{ with .Params.categories }}
        <div>
          {{ range . }}<span class="badge badge-{{ lower . }}">{{ . }}</span>{{ end }}
        </div>
        {{ end }}
        <div class="post-card-title">{{ .Title }}</div>
        {{ with .Params.description }}<div class="post-card-excerpt" style="font-style: italic;">{{ . }}</div>{{ end }}
        <div class="post-card-meta">{{ .Date.Format "January 2, 2006" }}</div>
      </div>
    </a>
  </div>
  {{ end }}
</div>
{{ end }}
